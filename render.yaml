services:
  - type: web
    name: garmin-proxy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GARMIN_EMAIL
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
